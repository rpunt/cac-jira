# Publishes to PyPI when a GitHub Release is created and published.
# Trigger: manually create a release in GitHub UI, which allows review
# of release notes before anything is pushed to PyPI.
# See: https://docs.pypi.org/trusted-publishers/using-a-publisher/

name: Upload Python Package

on:
  release:
    types: [published, created]

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write # for build provenance attestation
      id-token: write # to mint OIDC token for attestation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Attest generated files
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v2
        with:
          subject-path: dist/
      - name: Upload release distributions
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [release-build]

    environment:
      name: pypi
      url: https://pypi.org/p/cac-jira

    permissions:
      id-token: write # mandatory for trusted publishing

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
