name: Run Unit Test via Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0 # required for setuptools-scm to resolve version from tags
      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check lock file is up to date
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint with Ruff
        run: uv run ruff check --output-format=github .
        continue-on-error: true
      - name: Check code formatting with Ruff
        run: uv run ruff format --diff .
        continue-on-error: true
      - name: Test with pytest
        run: uv run pytest --cov=cac_jira --cov-report=term-missing
